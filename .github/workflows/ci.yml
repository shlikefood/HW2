name: CI/CD Pipeline - Build and Push Docker Image

# 트리거 조건: main 브랜치에 코드가 push되거나 병합될 때 작동
on:
  push:
    branches:
      - main
    # README 변경 같은 코어 로직과 상관없는 수정에서는 파이프라인 트리거 방지 (비용 절약)
    paths-ignore:
      - 'README.md'

jobs:
  build-and-push:
    # GitHub Action 러너 환경
    runs-on: ubuntu-latest

    steps:
      - name: 📥 소스 코드 체크아웃 (Checkout Repository)
        uses: actions/checkout@v3

      - name: 🐳 Docker Buildx 설정 (Set up Docker Buildx)
        # 멀티 아키텍처 지원 및 캐싱 최적화를 위해 Buildx 활성화
        uses: docker/setup-buildx-action@v2

      - name: 🔐 Docker Hub 로그인 (Log in to Docker Hub)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Docker 이미지 빌드 및 푸시 (Build and Push)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          # 이미지 태그: 유저 계정의 mlops-age-prediction 레포지토리에 latest 태그로 푸시
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mlops-age-prediction:latest
          
          # Docker 빌드 캐시 최적화 (이전 빌드 캐시 활용을 통해 속도 비약적 향상)
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-age-prediction:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/mlops-age-prediction:buildcache,mode=max

  deploy:
    name: 🚀 Deploy to Local (Self-hosted)
    needs: build-and-push # 빌드 및 푸시 작업이 먼저 성공해야 배포 시작
    runs-on: self-hosted  # 🔥 로컬 컴퓨터에 등록한 GitHub Self-hosted Runner 활성화

    steps:
      - name: 🔐 Docker Hub 로그인 (권한 획득)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🛑 기존 컨테이너 정리 (있는 경우만)
        # docker rm -f 명령어는 컨테이너를 강제(중지 후 삭제)로 없애줍니다.
        # 처음 실행 시 컨테이너가 없을 때 발생하는 에러를 무시하기 위해 continue-on-error를 켭니다.
        run: docker rm -f age-prediction-container
        continue-on-error: true

      - name: 🚀 최신 이미지 다운로드 및 실행
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mlops-age-prediction:latest
          docker run -d --name age-prediction-container -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/mlops-age-prediction:latest
