<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Age & Gender Predictor</title>
    <!-- 구글 폰트 (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob shape-1"></div>
        <div class="blob shape-2"></div>
        <div class="blob shape-3"></div>
    </div>

    <div class="container">
        <header>
            <h1>AI Vision Predictor</h1>
            <p>Upload a face to analyze Age & Gender</p>
        </header>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg" hidden>
            <div class="upload-content" id="uploadContent">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <p>Click or drag image here</p>
            </div>
            <img id="imagePreview" class="hidden" alt="Preview Image">
        </div>

        <button id="analyzeBtn" class="btn hidden">
            <span class="btn-text">Analyze Face</span>
            <div class="spinner hidden"></div>
        </button>

        <div id="resultBox" class="result-box hidden">
            <div class="result-item">
                <span class="label">Predicted Age</span>
                <span id="ageResult" class="value">--</span>
            </div>
            <div class="divider"></div>
            <div class="result-item">
                <span class="label">Predicted Gender</span>
                <span id="genderResult" class="value">--</span>
            </div>
        </div>
        
        <div id="errorBox" class="error-box hidden"></div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
